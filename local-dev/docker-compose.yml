services:
  plaid:
    build:
      context: ..
      dockerfile: local-dev/Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
      - "9464:9464"
    volumes:
      # Config files — edit these to configure APIs, webhooks, etc.
      - ./config:/config:ro
      # Secrets — copy secrets.toml.example to secrets.toml and add your keys
      - ./secrets:/secrets:ro
      # Persistent storage (when using Sled backend)
      - plaid-data:/data
    environment:
      - RUST_LOG=plaid=debug
    init: true
    stop_grace_period: 5s
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/live"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  prometheus:
    image: prom/prometheus:v3.2.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - plaid

volumes:
  plaid-data:
